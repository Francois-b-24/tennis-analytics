name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Installer les dépendances de l'app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Vérifier que les modules de l'app importent
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          sys.path.insert(0, 'app')
          from db.duckdb_session import create_connection
          from components.widgets import format_elo, country_flag, disambiguate_player_labels
          from components.plotly_theme import apply_tennis_theme
          print('Imports OK')
          "

      - name: Vérifier la taille des parquets versionnés
        env:
          MAX_PARQUET_BYTES: ${{ vars.MAX_PARQUET_BYTES }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          root = Path("data/processed")
          raw = os.environ.get("MAX_PARQUET_BYTES") or "100000000"
          limit = int(raw)
          failures = []
          if root.exists():
              for p in root.glob("*.parquet"):
                  sz = p.stat().st_size
                  if sz > limit:
                      failures.append(f"{p}: {sz} octets (> {limit})")
          if failures:
              print("Fichiers trop volumineux :")
              print("\n".join(failures))
              raise SystemExit(1)
          print("Contrôle des tailles parquet : OK")
          PY
